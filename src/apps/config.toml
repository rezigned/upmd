theme = "catppuccin-mocha"
transparent = false
tick_rate = 66

[tui]
inline_max_lines = 20

[cli]
preview_lines = 8

[keymap.home.DecreaseTocWidth]
description = "Decrease TOC panel width"
help = "toc narrower"
keys = ["<"]
symbol = "<"

[keymap.home.Envs]
description = "View environment variables"
help = "envs"
keys = ["e"]
symbol = "e"

[keymap.home.Execute]
description = "Execute code block"
help = "run"
keys = ["enter"]
symbol = "↵"

[keymap.home.ExitInput]
description = "Exit input mode"
help = "exit input"
keys = ["ctrl-o"]
symbol = "ctrl-o"

[keymap.home.Goto]
description = "Go to block by ID"
help = "goto"
keys = ["ctrl-g"]
symbol = "ctrl-g"

[keymap.home.Help]
description = "Show/hide help"
help = "help"
keys = ["?"]
symbol = "?"

[keymap.home.IncreaseTocWidth]
description = "Increase TOC panel width"
help = "toc wider"
keys = [">"]
symbol = ">"

[keymap.home.Input]
description = "Enter input mode for the selected running block"
help = "input"
keys = ["i"]
symbol = "i"

[keymap.home.OpenFilePicker]
description = "Open Markdown file picker"
help = "files"
keys = ["f"]
symbol = "f"

[keymap.home.Paste]
description = "Paste clipboard content into the active PTY."
help = "paste"
keys = ["ctrl-v"]
symbol = "ctrl-v"

[keymap.home.Quit]
description = "Quit"
help = "quit"
keys = [
    "q",
    "ctrl-c",
]
symbol = "q"

[keymap.home.Reload]
description = "Reload the input file, clearing all output"
keys = ["ctrl-r"]
symbol = "ctrl-r"

[keymap.home.Search]
description = "Search text"
help = "search"
keys = ["/"]
symbol = "/"

[keymap.home.SwitchTheme]
description = "Switch theme"
help = "theme"
keys = ["t"]
symbol = "t"

[keymap.home.ToggleTransparency]
description = "Toggle transparency"
help = "transparent"
keys = ["ctrl-t"]
symbol = "ctrl-t"

[keymap.home.ToggleZen]
description = "Toggle zen mode"
help = "zen"
keys = ["z"]
symbol = "z"

[keymap.home.ViewOutput]
description = "View output"
help = "output"
keys = ["o"]
symbol = "o"

[keymap.output.Back]
description = "Go back to home view"
help = "back"
keys = ["ctrl-o"]
symbol = "ctrl-o"

[keymap.output.BackIfDone]
description = "Go back to home view when the buffer is done (esc passthrough when running)"
help = "back (done)"
keys = ["esc"]
symbol = "esc"

[keymap.output.Copy]
description = "Copy output to clipboard"
help = "copy"
keys = [
    "y",
    "Y",
]
symbol = "y"

[keymap.output.Paste]
description = "Paste clipboard content into the active PTY"
help = "paste"
keys = ["ctrl-v"]
symbol = "ctrl-v"

[keymap.cli.Quit]
description = "Quits the application."
keys = [
    "q",
    "ctrl-c",
]
symbol = "q"

[keymap.cli.Run]
description = "Executes the selected code block."
keys = ["enter"]
symbol = "enter"

[keymap.menu.First]
description = "Move to first item"
keys = ["g"]
symbol = "g"

[keymap.menu.Last]
description = "Move to last item"
keys = [
    "shift-G",
    "G",
]
symbol = "shift-G"

[keymap.menu.Next]
description = "Move to next item"
keys = [
    "down",
    "ctrl-n",
    "j",
]
symbol = "down"

[keymap.menu.PageDown]
description = "Page down"
keys = [
    "pagedown",
    "ctrl-f",
]
symbol = "pagedown"

[keymap.menu.PageUp]
description = "Page up"
keys = [
    "pageup",
    "ctrl-b",
]
symbol = "pageup"

[keymap.menu.Prev]
description = "Move to previous item"
keys = [
    "up",
    "ctrl-p",
    "k",
]
symbol = "up"

[keymap.preview.Copy]
description = "Copies the current selection to the system clipboard."
keys = ["y"]
symbol = "y"

[keymap.preview.PageDown]
description = "Scrolls the viewport down by one page."
keys = [
    "pagedown",
    "ctrl-f",
]
symbol = "pagedown"

[keymap.preview.PageUp]
description = "Scrolls the viewport up by one page."
keys = [
    "pageup",
    "ctrl-b",
]
symbol = "pageup"

[keymap.preview.ScrollDown]
description = "Scrolls the preview content down by one line (mouse-triggered)."
